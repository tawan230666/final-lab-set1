services:
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-authdb}
      POSTGRES_USER: ${AUTH_DB_USER:-admin}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-secret}
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-admin} -d ${AUTH_DB_NAME:-authdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lab2-net

  auth-service:
    build: ./auth-service
    environment:
      DATABASE_URL: postgres://${AUTH_DB_USER:-admin}:${AUTH_DB_PASSWORD:-secret}@auth-db:5432/${AUTH_DB_NAME:-authdb}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - lab2-net

  task-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${TASK_DB_NAME:-taskdb}
      POSTGRES_USER: ${TASK_DB_USER:-admin}
      POSTGRES_PASSWORD: ${TASK_DB_PASSWORD:-secret}
    ports:
      - "5434:5432"
    volumes:
      - task-db-data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TASK_DB_USER:-admin} -d ${TASK_DB_NAME:-taskdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lab2-net

  task-service:
    build: ./task-service
    environment:
      DATABASE_URL: postgres://${TASK_DB_USER:-admin}:${TASK_DB_PASSWORD:-secret}@task-db:5432/${TASK_DB_NAME:-taskdb}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3002
      NODE_ENV: development
    ports:
      - "3002:3002"
    depends_on:
      task-db:
        condition: service_healthy
    networks:
      - lab2-net

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-userdb}
      POSTGRES_USER: ${USER_DB_USER:-admin}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-secret}
    ports:
      - "5435:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER:-admin} -d ${USER_DB_NAME:-userdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lab2-net

  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgres://${USER_DB_USER:-admin}:${USER_DB_PASSWORD:-secret}@user-db:5432/${USER_DB_NAME:-userdb}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3003
      NODE_ENV: development
    ports:
      - "3003:3003"
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - lab2-net

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    networks:
      - lab2-net

volumes:
  auth-db-data:
  task-db-data:
  user-db-data:

networks:
  lab2-net:
    driver: bridge
